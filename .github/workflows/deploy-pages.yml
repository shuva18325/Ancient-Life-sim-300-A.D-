name: Deploy SAND & STEEL to GitHub Pages

# Publishes the self-contained game (index.html) to GitHub Pages.
# Works from this feature branch and from main. If Pages is not yet enabled,
# configure-pages attempts to enable it automatically (enablement: true);
# otherwise set Settings -> Pages -> Source: GitHub Actions.

on:
  push:
    branches:
      - main
      - claude/pixel-gladiator-game-ostlrm
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
