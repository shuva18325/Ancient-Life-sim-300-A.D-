name: Deploy SAND & STEEL to GitHub Pages

# Publishes the self-contained game (index.html) to GitHub Pages.
# ONE-TIME SETUP: the Actions token cannot enable Pages itself, so first set
#   Settings -> Pages -> Build and deployment -> Source: GitHub Actions
# After that, every push to these branches deploys the game automatically.

on:
  push:
    branches:
      - main
      - claude/pixel-gladiator-game-ostlrm
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
